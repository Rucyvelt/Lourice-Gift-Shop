<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Lourice Gifts">
    <meta name="theme-color" content="#ff1493">
    <title>Lourice Gift Shop - Pink Collection 🎀</title>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe6f0 0%, #ffb6d9 50%, #ff69b4 100%);
            min-height: 100vh;
        }
        
        header {
            background: rgba(255,255,255,0.95);
            box-shadow: 0 2px 20px rgba(255,105,180,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo {
            font-size: 1.8em;
            font-weight: bold;
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.8em;
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            padding: 12px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(255,105,180,0.4);
            transition: transform 0.3s ease;
            color: white;
        }
        
        .cart-icon:hover {
            transform: scale(1.1);
        }
        
        .cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff1744;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 0.7em;
            font-weight: bold;
        }
        
        .hero {
            text-align: center;
            padding: 60px 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            background: linear-gradient(135deg, rgba(255,105,180,0.7), rgba(255,20,147,0.7));
        }
        
        .hero h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            animation: fadeInDown 0.8s ease;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .sidebar {
            width: 280px;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: sticky;
            top: 100px;
            height: fit-content;
        }
        
        .sidebar h3 {
            color: #ff1493;
            margin-bottom: 20px;
            font-size: 1.5em;
            text-align: center;
        }
        
        .category-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .category-btn {
            background: linear-gradient(135deg, #ffe6f0, #ffd9e8);
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1em;
            text-align: left;
            transition: all 0.3s ease;
            color: #ff1493;
            font-weight: bold;
        }
        
        .category-btn:hover {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            transform: translateX(5px);
        }
        
        .category-btn.active {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
        }
        
        .main-content {
            flex: 1;
            min-width: 300px;
        }
        
        .section-title {
            color: white;
            font-size: 2em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .product-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            position: relative;
        }
        
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255,105,180,0.3);
        }
        
        .product-image-container {
            width: 100%;
            height: 250px;
            overflow: hidden;
            background: linear-gradient(135deg, #ffe6f0, #ffd9e8);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .product-card:hover .product-image {
            transform: scale(1.05);
        }
        
        .product-info {
            padding: 20px;
        }
        
        .product-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .product-price {
            font-size: 1.5em;
            color: #ff1493;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .product-price::before {
            content: "KES ";
        }
        
        .product-description {
            color: #666;
            font-size: 0.85em;
            margin: 10px 0;
            line-height: 1.4;
        }
        
        .btn {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95em;
            width: 100%;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 15px rgba(255,105,180,0.4);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1001;
            overflow-y: auto;
        }
        
        .modal-content {
            background: white;
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 20px;
        }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #ffe6f0;
        }
        
        .cart-total {
            font-size: 1.3em;
            font-weight: bold;
            margin: 20px 0;
            text-align: right;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1002;
            animation: slideInRight 0.3s ease;
            border-left: 4px solid #4caf50;
        }
        
        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .footer {
            background: rgba(255,255,255,0.9);
            text-align: center;
            padding: 30px;
            margin-top: 50px;
            color: #ff1493;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                position: relative;
                top: 0;
            }
            .hero h1 {
                font-size: 2em;
            }
            .products-grid {
                grid-template-columns: 1fr;
            }
            .product-image-container {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">🎀 Lourice Gift Shop</div>
            <div class="cart-icon" onclick="openCart()">
                🛒 <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>
    
    <div class="hero">
        <h1>✨ Find the Perfect Gift ✨</h1>
        <p>Beautiful gifts for every special moment 💕</p>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <h3>📂 Categories</h3>
            <div class="category-list" id="categoryList"></div>
        </div>
        
        <div class="main-content">
            <h2 class="section-title" id="categoryTitle">✨ All Products</h2>
            <div class="products-grid" id="productsGrid">
                <div style="text-align: center; color: white;">Loading products...</div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>🎁 Lourice Gift Shop - Making every moment special 💖</p>
        <p>✨ Free delivery on orders over KES 5000 ✨</p>
    </div>
    
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <h2>🛒 Your Cart</h2>
            <div id="cartItems"></div>
            <div id="cartTotal" class="cart-total"></div>
            <button class="btn" onclick="checkout()">Checkout</button>
            <button class="btn" style="background:#999; margin-top:10px;" onclick="closeCart()">Close</button>
        </div>
    </div>
    
    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <h2>Complete Order</h2>
            <form id="checkoutForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="customerName" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phoneNumber" required>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="shippingAddress" required></textarea>
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select id="paymentMethod">
                        <option>Cash on Delivery</option>
                        <option>M-Pesa</option>
                    </select>
                </div>
                <button type="submit" class="btn">Place Order</button>
                <button type="button" class="btn" style="background:#999; margin-top:10px;" onclick="closeCheckout()">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        const API = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api' 
            : 'https://lourice-gift-shop.onrender.com/api';
        
        let currentCategory = 'all';
        
        // ============================================
        // YOUR IMAGE MAPPING - KEEP AS IS
        // ============================================
        function getProductImage(productId, productName, category) {
            const imageMap = {
                1: '/images/maxi.jpg',
                2: '/images/shirt.jpg',
                3: '/images/blazer.jpg',
                4: '/images/kidsdress.jpg',
                5: '/images/kanzu.jpg',
                6: '/images/gown.jpg',
                7: '/images/hoodie.jpg',
                8: '/images/jeans.jpg',
                9: '/images/swimwear.jpg',
                10: '/images/pajama.jpg',
                11: '/images/necklace.jpg',
                12: '/images/bag.jpg',
                13: '/images/sunglasses.jpg',
                14: '/images/watch.jpg',
                15: '/images/scarf.jpg',
                16: '/images/belt.jpg',
                17: '/images/earrings.jpg',
                18: '/images/bracelet.jpg',
                19: '/images/wallet.jpg',
                20: '/images/hat.jpg',
                21: '/images/smartphone.jpg',
                22: '/images/budgetphone.jpg',
                23: '/images/premiumphone.jpg',
                24: '/images/phonekit.jpg',
                25: '/images/earbuds.jpg',
                26: '/images/powerbank.jpg',
                27: '/images/stand.jpg',
                28: '/images/selfielight.jpg',
                29: '/images/barbie.jpg',
                30: '/images/babydoll.jpg',
                31: '/images/teddybear.jpg',
                32: '/images/princessdoll.jpg',
                33: '/images/animalset.jpg',
                34: '/images/dollhouse.jpg',
                35: '/images/unicorn.jpg',
                36: '/images/dollclothes.jpg',
                37: '/images/rccar.jpg',
                38: '/images/puzzle.jpg',
                39: '/images/roses.jpg',
                40: '/images/mixedflowers.jpg',
                41: '/images/lilies.jpg',
                42: '/images/sunflowers.jpg',
                43: '/images/orchid.jpg',
                44: '/images/flowerbox.jpg',
                45: '/images/tulips.jpg',
                46: '/images/driedflowers.jpg',
                47: '/images/birthdaycake.jpg',
                48: '/images/cupcakes.jpg',
                49: '/images/weddingcake.jpg',
                50: '/images/chocolates.jpg',
                51: '/images/fruitbasket.jpg',
                52: '/images/cookies.jpg',
                53: '/images/macarons.jpg',
                54: '/images/hamper.jpg',
                55: '/images/lacewig.jpg',
                56: '/images/curlywig.jpg',
                57: '/images/bobwig.jpg',
                58: '/images/longwig.jpg',
                59: '/images/coloredwig.jpg',
                60: '/images/wigcap.jpg',
                61: '/images/wigstand.jpg',
                62: '/images/wigkit.jpg',
                63: '/images/rccar.jpg',
                64: '/images/carmodels.jpg',
                65: '/images/truck.jpg',
                66: '/images/racetrack.jpg',
                67: '/images/pullbackcars.jpg',
                68: '/images/parkingset.jpg',
                69: '/images/lipstick.jpg',
                70: '/images/eyeshadow.jpg',
                71: '/images/foundation.jpg',
                72: '/images/mascara.jpg',
                73: '/images/brushes.jpg',
                74: '/images/highlighter.jpg',
                75: '/images/makeupbag.jpg',
                76: '/images/nailpolish.jpg',
                77: '/images/remover.jpg',
                78: '/images/facemask.jpg'
            };
            
            return imageMap[productId] || '/images/placeholder.jpg';
        }
        
        function loadCategories() {
            const categories = [
                { id: 'all', name: '🎁 All Products' },
                { id: 'clothing', name: '👗 Clothing' },
                { id: 'accessories', name: '💎 Accessories' },
                { id: 'phones', name: '📱 Phones' },
                { id: 'dolls', name: '🧸 Dolls' },
                { id: 'flowers', name: '🌹 Flowers' },
                { id: 'food', name: '🍰 Cakes' },
                { id: 'wigs', name: '💇 Wigs' },
                { id: 'cars', name: '🏎️ Cars' },
                { id: 'makeup', name: '💄 Makeup' }
            ];
            
            const container = document.getElementById('categoryList');
            container.innerHTML = categories.map(cat => `
                <button class="category-btn ${currentCategory === cat.id ? 'active' : ''}" onclick="loadProductsByCategory('${cat.id}')">
                    ${cat.name}
                </button>
            `).join('');
        }
        
        async function loadProductsByCategory(category) {
            currentCategory = category;
            loadCategories();
            
            const titles = {
                'all': '✨ All Products',
                'clothing': '👗 Clothing',
                'accessories': '💎 Accessories',
                'phones': '📱 Phones',
                'dolls': '🧸 Dolls',
                'flowers': '🌹 Flowers',
                'food': '🍰 Cakes',
                'wigs': '💇 Wigs',
                'cars': '🏎️ Cars',
                'makeup': '💄 Makeup'
            };
            document.getElementById('categoryTitle').textContent = titles[category] || '✨ Products';
            document.getElementById('productsGrid').innerHTML = '<div style="text-align: center; color: white;">Loading products...</div>';
            
            try {
                const url = category === 'all' ? `${API}/products` : `${API}/products/category/${category}`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.success && data.products) {
                    displayProducts(data.products);
                } else {
                    document.getElementById('productsGrid').innerHTML = '<div style="text-align: center; color: white;">No products found</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('productsGrid').innerHTML = '<div style="text-align: center; color: white;">Error loading products. Please try again.</div>';
            }
        }
        
        function displayProducts(products) {
            const grid = document.getElementById('productsGrid');
            
            if (!products || products.length === 0) {
                grid.innerHTML = '<div style="text-align: center; color: white;">No products available</div>';
                return;
            }
            
            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image-container">
                        <img class="product-image" 
                             src="${getProductImage(product.id, product.name, product.category)}" 
                             alt="${product.name}"
                             onerror="this.src='https://placehold.co/400x300/ffd9e8/ff1493?text=${encodeURIComponent(product.name)}'">
                    </div>
                    <div class="product-info">
                        <div class="product-name">${escapeHtml(product.name)}</div>
                        <div class="product-price">KES ${product.price.toLocaleString()}</div>
                        <div class="product-description">${escapeHtml(product.description || 'Beautiful gift for your loved ones')}</div>
                        <button class="btn" onclick="addToCart(${product.id})">Add to Cart 🛒</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function addToCart(productId) {
            try {
                const response = await fetch(`${API}/cart`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId, quantity: 1 })
                });
                if (response.ok) {
                    updateCartCount();
                    showToast('✨ Added to cart!', 'success');
                }
            } catch (error) {
                showToast('Error adding to cart', 'error');
            }
        }
        
        async function updateCartCount() {
            try {
                const response = await fetch(`${API}/cart`);
                const data = await response.json();
                const count = data.cart ? data.cart.reduce((sum, item) => sum + item.quantity, 0) : 0;
                document.getElementById('cartCount').textContent = count;
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function openCart() {
            try {
                const response = await fetch(`${API}/cart`);
                const data = await response.json();
                
                if (!data.cart || data.cart.length === 0) {
                    document.getElementById('cartItems').innerHTML = '<p style="text-align: center;">Your cart is empty</p>';
                    document.getElementById('cartTotal').innerHTML = '';
                } else {
                    document.getElementById('cartItems').innerHTML = data.cart.map(item => `
                        <div class="cart-item">
                            <div>
                                <strong>${escapeHtml(item.name)}</strong><br>
                                KES ${item.price.toLocaleString()} x ${item.quantity}
                            </div>
                            <div>
                                <button onclick="updateQuantity(${item.productId}, ${item.quantity - 1})">-</button>
                                <span>${item.quantity}</span>
                                <button onclick="updateQuantity(${item.productId}, ${item.quantity + 1})">+</button>
                                <button onclick="removeFromCart(${item.productId})">🗑️</button>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('cartTotal').innerHTML = `Total: KES ${data.total.toLocaleString()}`;
                }
                document.getElementById('cartModal').style.display = 'block';
            } catch (error) {
                showToast('Error loading cart', 'error');
            }
        }
        
        async function updateQuantity(productId, newQuantity) {
            if (newQuantity <= 0) {
                await removeFromCart(productId);
            } else {
                await fetch(`${API}/cart/${productId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ quantity: newQuantity })
                });
                openCart();
                updateCartCount();
            }
        }
        
        async function removeFromCart(productId) {
            await fetch(`${API}/cart/${productId}`, { method: 'DELETE' });
            openCart();
            updateCartCount();
        }
        
        function closeCart() {
            document.getElementById('cartModal').style.display = 'none';
        }
        
        function checkout() {
            closeCart();
            document.getElementById('checkoutModal').style.display = 'block';
        }
        
        function closeCheckout() {
            document.getElementById('checkoutModal').style.display = 'none';
        }
        
        document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const order = {
                customerName: document.getElementById('customerName').value,
                phoneNumber: document.getElementById('phoneNumber').value,
                shippingAddress: document.getElementById('shippingAddress').value,
                paymentMethod: document.getElementById('paymentMethod').value
            };
            
            try {
                const response = await fetch(`${API}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(order)
                });
                const data = await response.json();
                
                if (data.success) {
                    showToast('✅ Order placed successfully!', 'success');
                    closeCheckout();
                    updateCartCount();
                    document.getElementById('checkoutForm').reset();
                } else {
                    showToast(data.message || 'Error placing order', 'error');
                }
            } catch (error) {
                showToast('Error placing order', 'error');
            }
        });
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initialize
        loadCategories();
        loadProductsByCategory('all');
        updateCartCount();
    </script>
</body>
</html>
